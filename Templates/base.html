<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema ABA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }
        .sidebar {
            height: 100vh;
            background: #212529;
            color: white;
            padding-top: 20px;
        }
        .sidebar a {
            color: white;
            text-decoration: none;
            display: block;
            padding: 10px 20px;
        }
        .sidebar a:hover {
            background: #343a40;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-md-2 sidebar">
            <h4 class="text-center">ABA System</h4>
            <hr>
            <a href="/">Dashboard</a>
            <a href="/alunos">Alunos</a>
            <a href="/nova_sessao">Nova Sessão</a>
            <a href="/historico">Histórico</a>
        </div>

        <!-- Conteúdo -->
        <div class="col-md-10 p-4">
            {% block content %}{% endblock %}
        </div>

    </div>
</div>

</body>
</html>
